{% extends "base.html" %}
{% block title %}GarminForge — Two-Factor Authentication{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5">
    <div class="card bg-dark-subtle border-secondary">
      <div class="card-body p-4 text-center">
        <div class="mb-3 fs-1">🔐</div>
        <h4 class="fw-bold mb-1">Two-Factor Authentication</h4>
        <p class="text-muted small mb-4">
          Enter the verification code from your authenticator app or SMS.
        </p>
        <form method="post" action="/auth/mfa" id="mfaForm">
          <div class="mb-4">
            <input type="text" class="form-control form-control-lg bg-dark border-secondary
                   text-white text-center font-monospace fw-bold letter-spacing-lg"
                   id="mfa_code" name="mfa_code"
                   placeholder="000000"
                   maxlength="8"
                   inputmode="numeric"
                   autocomplete="one-time-code"
                   autofocus
                   required />
          </div>
          <button type="submit" class="btn btn-garmin w-100 py-2 fw-semibold" id="mfaBtn">
            <i class="bi bi-shield-check me-2"></i>Verify
          </button>
        </form>
        <div class="mt-3">
          <a href="/" class="text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Cancel and go back
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('mfaForm')?.addEventListener('submit', function() {
  const btn = document.getElementById('mfaBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verifying…';
});
// Auto-submit when 6 digits are entered
document.getElementById('mfa_code')?.addEventListener('input', function() {
  if (this.value.replace(/\D/g,'').length >= 6) {
    this.form.requestSubmit();
  }
});
</script>
{% endblock %}
