{% extends "base.html" %}
{% block title %}GarminForge — Connect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-9 col-lg-7">

    <!-- Hero -->
    <div class="text-center mb-5">
      <div class="hero-icon mb-3">⚙️</div>
      <h1 class="fw-bold display-6">GarminForge</h1>
      <p class="text-muted">Generate personalised strength workouts and send them directly to Garmin Connect.</p>
    </div>

    <!-- Auth card -->
    <div class="card bg-dark-subtle border-secondary mb-3">
      <div class="card-body p-4">
        <form method="post" action="/auth/login" id="loginForm">
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Garmin Connect Email</label>
            <div class="input-group">
              <span class="input-group-text bg-dark border-secondary">
                <i class="bi bi-envelope-fill text-muted"></i>
              </span>
              <input type="email" class="form-control bg-dark border-secondary text-white"
                     id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-dark border-secondary">
                <i class="bi bi-lock-fill text-muted"></i>
              </span>
              <input type="password" class="form-control bg-dark border-secondary text-white"
                     id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
              <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-garmin w-100 py-2 fw-semibold" id="loginBtn">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign in to Garmin Connect
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('togglePwd')?.addEventListener('click', function () {
  const pwd = document.getElementById('password');
  const icon = this.querySelector('i');
  pwd.type = pwd.type === 'password' ? 'text' : 'password';
  icon.className = pwd.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
});
document.getElementById('loginForm')?.addEventListener('submit', function () {
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Connecting…';
});
</script>
{% endblock %}
